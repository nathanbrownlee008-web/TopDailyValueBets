<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Daily Tips</title>
  <link rel="stylesheet" href="styles.css?v=1772618090" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <header class="main-header">
    <h1 class="logo-3d">Top Daily Tips</h1>

    <!-- VIP bar -->
    <div class="vip-bar">
      <button id="vipButton" class="vip-btn">Go VIP</button>
      <div id="vipStatus" class="vip-status"></div>
    </div>

    <div class="tabs">
      <button id="tabBets" class="active">Value Bets</button>
      <button id="tabTracker">Tracker</button>
      <button id="tabHistory">Daily History</button>
    </div>

    <div class="top-controls">
      <div class="layout-switch" role="group" aria-label="Layout">
        <button id="btnCompact" class="active">Compact</button>
        <button id="btnWide">Wide</button>
      </div>
    </div>
  </header>

  <section id="betsSection">
    <div id="betsGrid" class="bets-grid"></div>

    <div id="betsTableWrap" class="bets-table-wrap hidden">
      <table class="bets-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Sport</th>
            <th>League</th>
            <th>Match</th>
            <th>Pick</th>
            <th>Odds</th>
            <th>Stake</th>
            <th>Book</th>
          </tr>
        </thead>
        <tbody id="betsTableBody"></tbody>
      </table>
    </div>

    <div id="betsEmpty" class="empty hidden">No bets for today.</div>
  </section>

  <section id="trackerSection" class="hidden">
    <div class="section-title">Tracker</div>
    <div id="trackerWrap"></div>
  </section>

  <section id="historySection" class="hidden">
    <div class="section-title">Daily History</div>
    <div id="historyWrap"></div>
  </section>

  <!-- VIP Modal -->
  <div id="vipModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Go VIP</div>
        <button id="vipClose" class="modal-close" aria-label="Close">×</button>
      </div>

      <div class="modal-body">
        <label class="field-label" for="vipEmail">Email for access</label>
        <input id="vipEmail" class="field-input" type="email" placeholder="you@example.com" autocomplete="email" />

        <div class="plan-grid">
          <button id="vipMonthly" class="plan-btn">£12 / month</button>
          <button id="vipYearly" class="plan-btn">£80 / year</button>
        </div>

        <div class="small-muted">Tip: if you create a promo code in Stripe (e.g. first month £5), you can enter it on the checkout page.</div>

        <div id="vipError" class="error-text" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=1772618090"></script>
</body>
</html>
