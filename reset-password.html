<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Reset Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:Inter,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111827;
  padding:30px;
  border-radius:16px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#1e293b;
  color:white;
}

button{
  margin-top:15px;
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
}

#msg{
  margin-top:12px;
  color:#f87171;
}
</style>
</head>

<body>

<div class="box">
<h2>Set New Password</h2>

<input id="password" type="password" placeholder="New password">
<input id="confirmPassword" type="password" placeholder="Confirm new password">

<button id="save">Update Password</button>

<div id="msg"></div>
</div>

<script>

const SUPABASE_URL="https://krmmmutcejnzdfupexpv.supabase.co";
const SUPABASE_KEY="sb_publishable_3NHjMMVw1lai9UNAA-0QZA_sKM21LgD";

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const msgEl = document.getElementById("msg");

async function ensureRecoverySession(){
  const hash = window.location.hash || "";
  if(hash.includes("access_token") || hash.includes("refresh_token") || hash.includes("type=recovery")) {
    try{ await client.auth.getSession(); }catch(e){}
  }
}

document.getElementById("save").onclick=async()=>{
  const password=document.getElementById("password").value;
  const confirmPassword=document.getElementById("confirmPassword").value;

  if(password.length<6){
    msgEl.textContent="Password must be at least 6 characters";
    return;
  }

  if(password !== confirmPassword){
    msgEl.textContent="Passwords do not match";
    return;
  }

  msgEl.textContent="Checking reset link...";
  await ensureRecoverySession();
  const { data: sessionData } = await client.auth.getSession();
  if(!sessionData?.session){
    msgEl.textContent="Reset link is invalid or expired. Request a new password reset email.";
    return;
  }

  msgEl.textContent="Updating password...";
  const {error}=await client.auth.updateUser({ password });

  if(error){
    msgEl.textContent=error.message;
  }else{
    msgEl.style.color = "#86efac";
    msgEl.textContent="Password updated. You can now go back and restore VIP.";
    try{ await client.auth.signOut(); }catch(e){}
  }
}

ensureRecoverySession();

</script>

</body>
</html>
