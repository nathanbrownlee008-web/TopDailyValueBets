<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Reset Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:Inter,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111827;
  padding:30px;
  border-radius:16px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #334155;
  background:#1e293b;
  color:white;
}

button{
  margin-top:15px;
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
}

#msg{
  margin-top:12px;
  color:#f87171;
}
</style>
</head>

<body>

<div class="box">
<h2>Set New Password</h2>

<input id="password" type="password" placeholder="New password">

<button id="save">Update Password</button>

<div id="msg"></div>
</div>

<script>

const SUPABASE_URL="https://krmmmutcejnzdfupexpv.supabase.co";
const SUPABASE_KEY="sb_publishable_3NHjMMVw1lai9UNAA-0QZA_sKM21LgD";

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

document.getElementById("save").onclick=async()=>{

  const password=document.getElementById("password").value;

  if(password.length<6){
    document.getElementById("msg").textContent="Password must be at least 6 characters";
    return;
  }

  const {error}=await client.auth.updateUser({
    password:password
  });

  if(error){
    document.getElementById("msg").textContent=error.message;
  }else{
    document.getElementById("msg").textContent="Password updated. You can now login.";
  }

}

</script>

</body>
</html>
